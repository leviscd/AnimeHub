<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeFlix - Assista Animes Online Grátis</title>
    <meta name="description" content="AnimeFlix é a melhor plataforma para assistir animes online. Busque, descubra e maratone seus animes favoritos com episódios e temporadas completas.">
    <meta name="keywords" content="anime, assistir anime, episódios, temporadas, anime online, naruto, one piece, gogoanime">
    <link rel="canonical" href="https://animeflix.com/">
    <!-- Open Graph -->
    <meta property="og:title" content="AnimeFlix - Assista Animes Online">
    <meta property="og:description" content="O maior acervo de animes com busca, episódios e sinopse. Grátis e sem redirecionamentos.">
    <meta property="og:image" content="https://animeflix.com/og-image.jpg">
    <meta property="og:url" content="https://animeflix.com/">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="AnimeFlix - Assista Animes Online">
    <meta name="twitter:description" content="Pesquise e descubra animes com informações completas e player integrado.">
    <meta name="twitter:image" content="https://animeflix.com/og-image.jpg">
    <!-- JSON-LD para o site -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "AnimeFlix",
      "url": "https://animeflix.com/",
      "description": "Plataforma para assistir animes online gratuitamente.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://animeflix.com/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <style>
        /* ===== RESET & BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #fff; overflow-x: hidden; }
        a { color: #e50914; text-decoration: none; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }

        /* ===== HEADER (Netflix-style) ===== */
        header { background: linear-gradient(180deg, #0a0a0f 0%, rgba(10,10,15,0.9) 100%); padding: 16px 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .header-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .logo { display: flex; align-items: center; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; color: #e50914; }
        .logo svg { height: 36px; margin-right: 6px; fill: #e50914; }
        .logo span { color: #fff; font-weight: 300; }
        .search-wrapper { flex: 1; min-width: 180px; max-width: 450px; position: relative; }
        .search-wrapper input { width: 100%; padding: 10px 18px; border: none; border-radius: 30px; background: rgba(255,255,255,0.08); color: #fff; font-size: 14px; outline: 1px solid transparent; transition: 0.3s; }
        .search-wrapper input:focus { outline-color: #e50914; background: rgba(255,255,255,0.12); }
        .search-wrapper input::placeholder { color: #aaa; }
        .search-suggestions { position: absolute; top: 110%; left: 0; right: 0; background: #1a1a24; border-radius: 12px; padding: 8px 0; max-height: 300px; overflow-y: auto; display: none; z-index: 50; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .search-suggestions.active { display: block; }
        .search-suggestions .suggestion-item { padding: 8px 18px; cursor: pointer; transition: 0.15s; font-size: 14px; }
        .search-suggestions .suggestion-item:hover { background: #2a2a3a; }
        .lang-selector { display: flex; gap: 6px; }
        .lang-btn { background: transparent; border: 1px solid #444; color: #aaa; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .lang-btn.active { border-color: #e50914; color: #fff; background: rgba(229,9,20,0.2); }
        .lang-btn:hover { border-color: #e50914; }

        /* ===== NAVEGAÇÃO ===== */
        nav { display: flex; gap: 24px; padding: 12px 0 6px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 6px; flex-wrap: wrap; }
        nav a { color: #aaa; font-size: 14px; font-weight: 500; cursor: pointer; transition: 0.2s; position: relative; }
        nav a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: #e50914; transition: 0.3s; }
        nav a:hover { color: #fff; }
        nav a:hover::after { width: 100%; }
        nav a.active { color: #fff; }
        nav a.active::after { width: 100%; }

        /* ===== HERO / DESTAQUE ===== */
        .hero { margin: 20px 0 30px; border-radius: 20px; overflow: hidden; position: relative; background: #111; min-height: 300px; display: flex; align-items: flex-end; padding: 40px; background-size: cover; background-position: center; background-image: linear-gradient(135deg, #1a1a2e 0%, #0a0a0f 100%); }
        .hero-content { max-width: 600px; z-index: 2; }
        .hero-content h1 { font-size: 42px; font-weight: 800; margin-bottom: 8px; text-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        .hero-content p { font-size: 16px; color: #ccc; margin-bottom: 16px; text-shadow: 0 2px 10px rgba(0,0,0,0.6); }
        .hero-content .btn { display: inline-block; background: #e50914; color: #fff; padding: 10px 28px; border-radius: 30px; font-weight: 600; border: none; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .hero-content .btn:hover { background: #b20710; transform: scale(1.02); }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(10,10,15,0.9) 0%, transparent 80%); z-index: 1; }

        /* ===== GRID DE ANIMES (Netflix-style) ===== */
        .section-title { font-size: 24px; font-weight: 700; margin: 30px 0 18px; letter-spacing: -0.3px; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .anime-card { background: #14141e; border-radius: 14px; overflow: hidden; transition: transform 0.25s, box-shadow 0.25s; cursor: pointer; position: relative; }
        .anime-card:hover { transform: scale(1.04); box-shadow: 0 15px 30px rgba(0,0,0,0.7); z-index: 10; }
        .anime-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .anime-card .info { padding: 12px 14px 14px; }
        .anime-card .title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .anime-card .meta { display: flex; justify-content: space-between; font-size: 13px; color: #888; margin-top: 4px; }
        .anime-card .score { color: #f5c518; }
        .anime-card .badge { position: absolute; top: 10px; right: 10px; background: rgba(229,9,20,0.85); padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; backdrop-filter: blur(4px); }

        /* ===== CARREGAR MAIS ===== */
        .load-more { text-align: center; margin: 30px 0 20px; }
        .load-more button { background: #1f1f2e; border: none; color: #fff; padding: 12px 40px; border-radius: 40px; font-weight: 600; font-size: 15px; cursor: pointer; transition: 0.3s; }
        .load-more button:hover { background: #2f2f42; transform: scale(1.02); }

        /* ===== MODAL / PLAYER ===== */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 999; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal { background: #14141e; max-width: 1100px; width: 100%; border-radius: 24px; max-height: 96vh; overflow-y: auto; padding: 25px; position: relative; animation: modalFade 0.3s; }
        @keyframes modalFade { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
        .modal-close { position: sticky; top: 0; float: right; background: rgba(255,255,255,0.05); border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; font-size: 24px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .modal-close:hover { background: #e50914; }
        .modal-player { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .modal-player iframe { width: 100%; height: 100%; border: none; }
        .modal h2 { font-size: 28px; margin-bottom: 8px; }
        .modal .synopsis { color: #ccc; line-height: 1.7; margin: 12px 0; }
        .modal .details { display: flex; flex-wrap: wrap; gap: 12px; margin: 10px 0 16px; }
        .modal .details span { background: #222; padding: 4px 16px; border-radius: 30px; font-size: 13px; }
        .modal .episodes { margin-top: 18px; }
        .modal .episodes h3 { margin-bottom: 10px; font-size: 18px; }
        .modal .episodes-grid { display: flex; flex-wrap: wrap; gap: 8px; max-height: 200px; overflow-y: auto; padding: 4px 0; }
        .modal .episodes-grid .ep-btn { background: #1f1f2e; border: none; color: #ddd; padding: 6px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .modal .episodes-grid .ep-btn:hover { background: #e50914; color: #fff; }
        .modal .episodes-grid .ep-btn.active-ep { background: #e50914; color: #fff; }

        /* ===== FOOTER ===== */
        footer { background: #0a0a0f; border-top: 1px solid #1a1a24; padding: 30px 0; margin-top: 40px; text-align: center; color: #666; font-size: 14px; }
        footer a { color: #e50914; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header-inner { flex-wrap: wrap; justify-content: center; }
            .logo { font-size: 22px; }
            .search-wrapper { max-width: 100%; }
            .lang-selector { justify-content: center; }
            nav { justify-content: center; gap: 14px; }
            .hero { padding: 20px; min-height: 200px; }
            .hero-content h1 { font-size: 28px; }
            .anime-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
            .modal { padding: 15px; }
            .modal h2 { font-size: 22px; }
        }
        @media (max-width: 480px) {
            .anime-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0f; }
        ::-webkit-scrollbar-thumb { background: #e50914; border-radius: 10px; }

        /* Ad placeholders */
        .ad-container { background: #1a1a24; border-radius: 16px; padding: 16px; text-align: center; color: #555; border: 1px dashed #333; margin: 24px 0; font-size: 14px; }
        .ad-container::before { content: "📢 Espaço para Anúncios Monetag"; display: block; color: #777; }
    </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
    <div class="container header-inner">
        <div class="logo">
            <svg viewBox="0 0 24 24" width="36" height="36"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
            <span>Anime</span>Flix
        </div>
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Buscar animes..." autocomplete="off">
            <div class="search-suggestions" id="suggestions"></div>
        </div>
        <div class="lang-selector" id="langSelector">
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="es">ES</button>
            <button class="lang-btn active" data-lang="pt">PT</button>
        </div>
    </div>
    <div class="container">
        <nav id="mainNav">
            <a data-nav="home" class="active">Início</a>
            <a data-nav="top">Top</a>
            <a data-nav="season">Temporada</a>
            <a data-nav="genres">Gêneros</a>
        </nav>
    </div>
</header>

<!-- ===== HERO ===== -->
<div class="container">
    <div class="hero" id="heroBanner" style="background-image: linear-gradient(135deg, #1a1a2e, #0a0a0f);">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 id="heroTitle">Animes em Destaque</h1>
            <p id="heroDesc">Descubra os melhores animes e assista online gratuitamente.</p>
            <button class="btn" id="heroBtn">Explorar</button>
        </div>
    </div>
</div>

<!-- ===== MAIN CONTENT ===== -->
<main class="container" id="mainContent">
    <div class="section-title" id="pageTitle">Populares</div>
    <div class="ad-container"></div>
    <div class="anime-grid" id="animeGrid"></div>
    <div class="load-more" id="loadMoreWrap">
        <button id="loadMoreBtn">Carregar mais</button>
    </div>
</main>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent">
        <button class="modal-close" id="modalClose">&times;</button>
        <div id="modalBody"></div>
    </div>
</div>

<!-- ===== FOOTER ===== -->
<footer>
    <div class="container">
        <p>© 2026 AnimeFlix - Todos os direitos reservados. Dados: <a href="https://jikan.moe/" target="_blank">Jikan API</a>.</p>
        <p style="margin-top:6px;">
            <a href="/sitemap.xml">Sitemap</a> | 
            <a href="/robots.txt">Robots</a> | 
            <a href="#">Privacidade</a>
        </p>
    </div>
</footer>

<script>
// ============================================================
//   TRADUÇÕES
// ============================================================
const langDict = {
    en: {
        placeholder: 'Search animes...',
        home: 'Home', top: 'Top', season: 'Season', genres: 'Genres',
        popular: 'Popular', heroTitle: 'Featured Animes', heroDesc: 'Discover the best animes and watch online for free.',
        episodes: 'Episodes', score: 'Score', synopsis: 'Synopsis', close: 'Close',
        loadMore: 'Load more', noResults: 'No animes found.'
    },
    es: {
        placeholder: 'Buscar animes...',
        home: 'Inicio', top: 'Top', season: 'Temporada', genres: 'Géneros',
        popular: 'Populares', heroTitle: 'Animes Destacados', heroDesc: 'Descubre los mejores animes y mira online gratis.',
        episodes: 'Episodios', score: 'Puntuación', synopsis: 'Sinopsis', close: 'Cerrar',
        loadMore: 'Cargar más', noResults: 'No se encontraron animes.'
    },
    pt: {
        placeholder: 'Buscar animes...',
        home: 'Início', top: 'Top', season: 'Temporada', genres: 'Gêneros',
        popular: 'Populares', heroTitle: 'Animes em Destaque', heroDesc: 'Descubra os melhores animes e assista online grátis.',
        episodes: 'Episódios', score: 'Nota', synopsis: 'Sinopse', close: 'Fechar',
        loadMore: 'Carregar mais', noResults: 'Nenhum anime encontrado.'
    }
};

// ============================================================
//   ESTADO
// ============================================================
let currentLang = 'pt';
let currentNav = 'home';
let currentQuery = '';
let currentPage = 1;
let isLoading = false;
let hasMore = true;
let allAnimes = [];
let currentAnimeId = null;
let currentEpisodes = [];
let currentEpisodeIndex = 0;

// ============================================================
//   DETECTAR IDIOMA POR IP
// ============================================================
async function detectLanguage() {
    try {
        const res = await fetch('https://ip-api.com/json/');
        const data = await res.json();
        if (data.status === 'success') {
            const cc = data.countryCode;
            if (['US','GB','AU','CA'].includes(cc)) return 'en';
            if (['ES','MX','AR','CO','PE','CL'].includes(cc)) return 'es';
            if (['PT','BR'].includes(cc)) return 'pt';
        }
    } catch (_) {}
    return 'pt';
}

// ============================================================
//   FUNÇÃO DE TRADUÇÃO (para textos estáticos)
// ============================================================
function t(key) {
    return langDict[currentLang]?.[key] || langDict['pt'][key] || key;
}

// ============================================================
//   ATUALIZAR UI (textos estáticos)
// ============================================================
function updateUI() {
    document.querySelector('#searchInput').placeholder = t('placeholder');
    document.querySelector('#pageTitle').textContent = 
        currentNav === 'home' ? t('popular') :
        currentNav === 'top' ? t('top') :
        currentNav === 'season' ? t('season') : t('genres');
    document.querySelector('#heroTitle').textContent = t('heroTitle');
    document.querySelector('#heroDesc').textContent = t('heroDesc');
    document.querySelector('#loadMoreBtn').textContent = t('loadMore');
    // Nav
    document.querySelectorAll('#mainNav a').forEach(el => {
        const key = el.dataset.nav;
        el.textContent = t(key);
    });
    // Lang buttons
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === currentLang);
    });
    // Atualizar título e meta
    document.title = `AnimeFlix - ${t('home')} | Assista Animes Online`;
    document.querySelector('meta[name="description"]').content = t('heroDesc');
}

// ============================================================
//   API - BUSCAR ANIMES
// ============================================================
async function fetchAnimes(page = 1, query = '', nav = 'home') {
    let url = '';
    if (query) {
        url = `https://api.jikan.moe/v4/anime?q=${encodeURIComponent(query)}&page=${page}&limit=20`;
    } else if (nav === 'top') {
        url = `https://api.jikan.moe/v4/top/anime?page=${page}&limit=20`;
    } else if (nav === 'season') {
        const now = new Date();
        const year = now.getFullYear();
        const seasons = ['winter','spring','summer','fall'];
        const season = seasons[Math.floor((now.getMonth()+1)/3) % 4];
        url = `https://api.jikan.moe/v4/seasons/${year}/${season}?page=${page}&limit=20`;
    } else {
        url = `https://api.jikan.moe/v4/top/anime?page=${page}&limit=20`; // home
    }
    const res = await fetch(url);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    return { animes: data.data || [], pagination: data.pagination };
}

// ============================================================
//   RENDER CARDS
// ============================================================
function renderCards(animes, append = false) {
    const grid = document.getElementById('animeGrid');
    if (!append) grid.innerHTML = '';
    if (!animes || animes.length === 0) {
        if (!append) grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:#888;">${t('noResults')}</div>`;
        return;
    }
    const html = animes.map(a => `
        <div class="anime-card" data-id="${a.mal_id}" onclick="openModal(${a.mal_id})">
            <img src="${a.images.jpg.image_url}" alt="${a.title}" loading="lazy">
            <div class="badge">${a.episodes || '?'}</div>
            <div class="info">
                <div class="title">${a.title}</div>
                <div class="meta">
                    <span>${a.episodes || '?'} ep.</span>
                    <span class="score">★ ${a.score || 'N/A'}</span>
                </div>
            </div>
        </div>
    `).join('');
    if (append) {
        grid.insertAdjacentHTML('beforeend', html);
    } else {
        grid.innerHTML = html;
    }
}

// ============================================================
//   CARREGAR MAIS (INFINITE SCROLL + BOTÃO)
// ============================================================
async function loadMore() {
    if (isLoading || !hasMore) return;
    isLoading = true;
    document.getElementById('loadMoreBtn').textContent = 'Carregando...';
    try {
        const nextPage = currentPage + 1;
        const { animes, pagination } = await fetchAnimes(nextPage, currentQuery, currentNav);
        if (animes.length === 0) {
            hasMore = false;
            document.getElementById('loadMoreBtn').textContent = 'Sem mais animes';
            return;
        }
        allAnimes = allAnimes.concat(animes);
        renderCards(animes, true);
        currentPage = nextPage;
        hasMore = pagination?.has_next_page || false;
        document.getElementById('loadMoreBtn').textContent = hasMore ? t('loadMore') : 'Fim da lista';
    } catch (err) {
        document.getElementById('loadMoreBtn').textContent = 'Erro ao carregar';
    } finally {
        isLoading = false;
    }
}

// ============================================================
//   CARREGAR INICIAL
// ============================================================
async function loadInitial(nav = 'home', query = '') {
    currentNav = nav;
    currentQuery = query;
    currentPage = 1;
    hasMore = true;
    allAnimes = [];
    document.getElementById('loadMoreBtn').textContent = t('loadMore');
    document.getElementById('animeGrid').innerHTML = '<div style="text-align:center;padding:40px;color:#888;">Carregando...</div>';
    try {
        const { animes, pagination } = await fetchAnimes(1, query, nav);
        allAnimes = animes;
        renderCards(animes, false);
        hasMore = pagination?.has_next_page || false;
        document.getElementById('loadMoreBtn').textContent = hasMore ? t('loadMore') : 'Fim da lista';
        // Atualizar título da página
        document.querySelector('#pageTitle').textContent = 
            query ? `Resultados para "${query}"` :
            nav === 'home' ? t('popular') :
            nav === 'top' ? t('top') :
            nav === 'season' ? t('season') : t('genres');
        // Atualizar URL
        const params = new URLSearchParams();
        if (query) params.set('search', query);
        else params.set('nav', nav);
        window.history.pushState({}, '', '?' + params.toString());
    } catch (err) {
        document.getElementById('animeGrid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:#e50914;">Erro ao carregar animes.</div>`;
    }
    updateUI();
}

// ============================================================
//   BUSCA COM SUGESTÕES (autocomplete)
// ============================================================
let searchTimeout = null;
document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.trim();
    const suggestions = document.getElementById('suggestions');
    if (q.length < 2) {
        suggestions.classList.remove('active');
        return;
    }
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(async () => {
        try {
            const res = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(q)}&limit=5`);
            const data = await res.json();
            if (data.data && data.data.length) {
                suggestions.innerHTML = data.data.map(a => `
                    <div class="suggestion-item" data-id="${a.mal_id}">${a.title}</div>
                `).join('');
                suggestions.classList.add('active');
                // Clicar na sugestão
                document.querySelectorAll('.suggestion-item').forEach(el => {
                    el.addEventListener('click', function() {
                        const id = this.dataset.id;
                        openModal(parseInt(id));
                        suggestions.classList.remove('active');
                        document.getElementById('searchInput').value = '';
                    });
                });
            } else {
                suggestions.classList.remove('active');
            }
        } catch (_) {
            suggestions.classList.remove('active');
        }
    }, 300);
});
// Fechar sugestões ao clicar fora
document.addEventListener('click', function(e) {
    if (!e.target.closest('.search-wrapper')) {
        document.getElementById('suggestions').classList.remove('active');
    }
});
// Buscar ao pressionar Enter
document.getElementById('searchInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        const q = this.value.trim();
        if (q) {
            document.getElementById('suggestions').classList.remove('active');
            loadInitial('home', q);
        }
    }
});

// ============================================================
//   MODAL COM PLAYER EMBUTIDO
// ============================================================
async function openModal(id) {
    const overlay = document.getElementById('modalOverlay');
    const body = document.getElementById('modalBody');
    overlay.classList.add('active');
    body.innerHTML = '<div style="text-align:center;padding:30px;">Carregando...</div>';

    try {
        // Dados do anime
        const res = await fetch(`https://api.jikan.moe/v4/anime/${id}/full`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        const anime = data.data;
        currentAnimeId = id;

        // Buscar episódios
        const epRes = await fetch(`https://api.jikan.moe/v4/anime/${id}/episodes?limit=100`);
        let episodes = [];
        if (epRes.ok) {
            const epData = await epRes.json();
            episodes = epData.data || [];
        }
        currentEpisodes = episodes;
        currentEpisodeIndex = 0;

        // Traduzir sinopse (se não for inglês)
        let synopsis = anime.synopsis || 'Sinopse não disponível.';
        if (currentLang !== 'en' && synopsis.length > 10) {
            try {
                const translateRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(synopsis)}&langpair=en|${currentLang}`);
                const transData = await translateRes.json();
                if (transData.responseData?.translatedText) synopsis = transData.responseData.translatedText;
            } catch (_) {}
        }

        // Montar modal
        body.innerHTML = `
            <div class="modal-player">
                <iframe id="playerIframe" src="https://gogoanime.llc/embed/${anime.title.toLowerCase().replace(/\s/g, '-')}-episode-1" allowfullscreen></iframe>
            </div>
            <h2>${anime.title}</h2>
            <div class="details">
                <span>★ ${anime.score || 'N/A'}</span>
                <span>${anime.episodes || '?'} ep.</span>
                <span>${anime.status || ''}</span>
                ${anime.genres ? anime.genres.slice(0,3).map(g => `<span>#${g.name}</span>`).join('') : ''}
            </div>
            <div class="synopsis"><strong>${t('synopsis')}:</strong> ${synopsis}</div>
            ${episodes.length > 0 ? `
                <div class="episodes">
                    <h3>${t('episodes')}</h3>
                    <div class="episodes-grid" id="episodesGrid">
                        ${episodes.map((ep, idx) => `
                            <button class="ep-btn ${idx === 0 ? 'active-ep' : ''}" data-ep="${ep.mal_id}" data-idx="${idx}">${ep.mal_id}</button>
                        `).join('')}
                    </div>
                </div>
            ` : ''}
        `;

        // Evento para trocar episódio no player
        document.querySelectorAll('.ep-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const idx = parseInt(this.dataset.idx);
                const ep = currentEpisodes[idx];
                if (!ep) return;
                currentEpisodeIndex = idx;
                const iframe = document.getElementById('playerIframe');
                if (iframe) {
                    const titleSlug = anime.title.toLowerCase().replace(/\s/g, '-');
                    iframe.src = `https://gogoanime.llc/embed/${titleSlug}-episode-${ep.mal_id}`;
                }
                document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active-ep'));
                this.classList.add('active-ep');
            });
        });

        // JSON-LD para este anime
        const jsonld = {
            "@context": "https://schema.org",
            "@type": "TVSeries",
            "name": anime.title,
            "description": synopsis,
            "image": anime.images.jpg.large_image_url,
            "numberOfEpisodes": anime.episodes,
            "genre": anime.genres?.map(g => g.name).join(', '),
            "aggregateRating": { "@type": "AggregateRating", "ratingValue": anime.score }
        };
        const script = document.createElement('script');
        script.type = 'application/ld+json';
        script.textContent = JSON.stringify(jsonld);
        body.appendChild(script);

    } catch (err) {
        body.innerHTML = `<p style="color:#e50914;">Erro ao carregar detalhes.</p>`;
    }
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    // Parar player (opcional)
    const iframe = document.getElementById('playerIframe');
    if (iframe) iframe.src = '';
}

// ============================================================
//   NAVEGAÇÃO POR CATEGORIA
// ============================================================
document.querySelectorAll('#mainNav a').forEach(el => {
    el.addEventListener('click', function() {
        document.querySelectorAll('#mainNav a').forEach(a => a.classList.remove('active'));
        this.classList.add('active');
        const nav = this.dataset.nav;
        document.getElementById('searchInput').value = '';
        loadInitial(nav, '');
    });
});

// ============================================================
//   EVENTOS GERAIS
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
    // Detectar idioma
    const detected = await detectLanguage();
    currentLang = detected;
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === currentLang);
    });
    updateUI();

    // Carregar conteúdo inicial baseado na URL
    const params = new URLSearchParams(window.location.search);
    const search = params.get('search');
    const nav = params.get('nav') || 'home';
    if (search) {
        document.getElementById('searchInput').value = search;
        loadInitial('home', search);
    } else {
        loadInitial(nav, '');
    }

    // Botão de carregar mais
    document.getElementById('loadMoreBtn').addEventListener('click', loadMore);

    // Fechar modal
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeModal();
    });

    // Seletor de idioma
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const lang = this.dataset.lang;
            if (lang === currentLang) return;
            currentLang = lang;
            updateUI();
            // Recarregar lista atual (sem perder posição)
            if (currentQuery) {
                loadInitial('home', currentQuery);
            } else {
                loadInitial(currentNav, '');
            }
            closeModal();
        });
    });

    // Botão do hero
    document.getElementById('heroBtn').addEventListener('click', () => {
        document.getElementById('pageTitle').scrollIntoView({ behavior: 'smooth' });
    });

    // Sitemap/robots simulado
    document.querySelectorAll('footer a[href*="sitemap"], footer a[href*="robots"]').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            alert('Em produção, este arquivo seria gerado dinamicamente.');
        });
    });
});

// ============================================================
//   EXPOR FUNÇÕES GLOBAIS
// ============================================================
window.openModal = openModal;
window.closeModal = closeModal;
window.loadMore = loadMore;
</script>
</body>
</html>
